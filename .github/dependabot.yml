version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
