name: Dependency security

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Audit declared dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .
