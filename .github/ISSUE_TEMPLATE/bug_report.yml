name: Bug report
description: Report reproducible incorrect behavior in the current project.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Remove credentials and customer data before submitting."
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Provider mode
      options:
        - local
        - openai-compatible
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system and Python version.
      placeholder: "Windows 11, Python 3.12"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use fictional, sanitized inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized error
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed API keys, tokens, customer data, and private contact details.
          required: true
        - label: I reproduced this in local mode when applicable.
          required: false
